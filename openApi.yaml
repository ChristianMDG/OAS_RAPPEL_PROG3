openapi: 3.0.3
info:
  title: TD5 Ingredient SpringBoot API
  description: REST API for managing ingredients and dishes.
  version: 1.0.0
  contact:
    name: Christian RAVELOJAONA
    email: christianravalojaona186@gmail.com
servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Ingredients
    description: Operations on ingredients
  - name: Dishes
    description: Operations on dishes
paths:
  /ingredients:
    get:
      tags:
        - Ingredients
      summary: Retrieve all ingredients
      operationId: getAllIngredients
      responses:
        '200':
          description: List of all ingredients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ingredient'
        '500':
          description: Internal server error

  /ingredients/{id}:
    get:
      tags:
        - Ingredients
      summary: Retrieve an ingredient by its ID
      operationId: getIngredientById
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier of the ingredient
          schema:
            type: integer
            example: 2
      responses:
        '200':
          description: Ingredient found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ingredient'
        '404':
          description: Ingredient.id={id) is not found
        '500':
          description: Internal server error

  /ingredients/{id}/stock:
    get:
      tags:
        - Ingredients
      summary: Retrieve the stock of an ingredient at a given date
      operationId: getIngredientStock
      parameters:
        - name: id
          in: path
          required: true
          description: Identifier of the ingredient
          schema:
            type: integer
            example: 1
        - name: at
          in: query
          required: true
          description: Date and time for which to retrieve the stock (ISO 8601 format)
          schema:
            type: string
            format: date-time
            example: "2015-01-07T00:00:00Z"
        - name: unit
          in: query
          required: true
          description: Unit of measurement for the stock
          schema:
            type: string
            enum:
              - KG
              - L
              - PCS
            example: KG
      responses:
        '200':
          description: Stock of the ingredient at the specified date
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stock'
        '400':
          description: Either mandatory query parameter `at` or `unit` is not provided.
        '404':
          description: Ingredient.id={id) is not found
        '500':
          description: Internal server error

  /dishes:
    get:
      tags:
        - Dishes
      summary: Retrieve all dishes
      operationId: getAllDishes
      responses:
        '200':
          description: List of all dishes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Dish'
        '500':
          description: Internal server error
  /dishes/{id}/ingredients:
    put:
      tags:
        - Dishes
      summary: Update the ingredients of a dish
      operationId: updateDishIngredients
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier of the dish
          schema:
            type: integer
            example: 2
      requestBody:
        required: true
        description: List of ingredients to associate with the dish (by their ID)
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/IngredientRef'
            example:
              - id: 1
              - id: 2
      responses:
        '200':
          description: Dish updated with the new ingredients
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dish'
        '400':
          description: Invalid request body
        '404':
          description: Dish or ingredient not found
        '500':
          description: Internal server error

components:
  schemas:
    Ingredient:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier of the ingredient
          example: 1
        name:
          type: string
          description: Name of the ingredient
          example: "Laitue"
        price:
          type: number
          format: float
          description: Price per unit of the ingredient
          example: 800.0
        category:
          type: string
          enum:
          - VEGETABLE
          - ANIMAL
          - MARINE
          - DAIRY
          - OTHER
          description: Category of the ingredient
          example: "VEGETABLE"
    Stock:
      type: object
      properties:
        quantity:
          type: number
          format: double
          description: Quantity in stock
          example: 4.8
        unit:
          type: string
          description: Unit of measurement for the stock
          example: "KG"
    # IngredientWithStock:
    #   allOf:
    #     - $ref: '#/components/schemas/Ingredient'
    #     - type: object
    #       properties:
    #         stock:
    #           $ref: '#/components/schemas/Stock'

    IngredientRef:
      type: object
      description: Reference to an ingredient by its ID
      properties:
        id:
          type: integer
          description: Identifier of the ingredient
          example: 1
      required:
        - id
    Dish:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier of the dish
          example: 1
        name:
          type: string
          description: Name of the dish
          example: "Salaide fraîche"
        dishType:
          type: string
          enum:
          - STARTER
          - MAIN
          - DESSERT
          description: Type of the dish
          example: "STARTER"
        ingredients:
          type: array
          description: List of ingredients in the dish
          items:
            $ref: '#/components/schemas/Ingredient'